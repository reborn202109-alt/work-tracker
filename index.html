async function loadDataFromSupabase() {
  try {
    const { data, error } = await sbClient.from("work_tracker_data").select("*").eq("user_id", USER_ID).single();
    if (error || !data) return null;
    const parsed = JSON.parse(data.payload);
    if (parsed.settings && parsed.settings.incomeCategories && parsed.settings.incomeCategories[0] && typeof parsed.settings.incomeCategories[0] === "string") {
      parsed.settings.incomeCategories = parsed.settings.incomeCategories.map(function(n) { return { name: n, color: "#818cf8" }; });
    }
    if (parsed.settings && !parsed.settings.fixedExpenses) parsed.settings.fixedExpenses = [];
    return parsed;
  } catch (e) { return null; }
}

async function saveDataToSupabase(d) {
  try {
    await sbClient.from("work_tracker_data").upsert({ user_id: USER_ID, payload: JSON.stringify(d), updated_at: new Date().toISOString() }, { onConflict: "user_id" });
  } catch (e) {}
}

const DEFAULT_EXPENSE_CATEGORIES = ["식비", "교통비", "주거비", "통신비", "의류", "기타"];
const WEATHER_OPTIONS = [
  { icon: "☀️", label: "맑음" },
  { icon: "⛅", label: "흐림" },
  { icon: "🌧️", label: "비" },
  { icon: "❄️", label: "눈" },
  { icon: "🌪️", label: "바람" }
];
const WEEKDAYS = ["일", "월", "화", "수", "목", "금", "토"];
const MOTIVATIONS_SUCCESS = ["🔥 오늘도 목표 달성! 이 기세 유지해요!", "✨ 완벽해요! 당신은 할 수 있어요!", "🎉 목표 초과 달성! 진짜 열심히 했네요!", "💪 역시! 오늘도 멋지게 해냈어요!"];
const MOTIVATIONS_FAIL = ["😤 조금만 더 하면 됐는데! 내일은 꼭!", "🪤 이러면 안 되죠~ 내일은 정신 차려요!", "😡 목표도 못 채웠어요?! 반성하고 내일 두 배로!", "💢 채찍! 채찍! 게으름 피우면 안 돼요!"];

function calcHours(start, end) {
  if (!start || !end) return 0;
  const sParts = start.split(":").map(Number);
  const eParts = end.split(":").map(Number);
  let mins = (eParts[0] * 60 + eParts[1]) - (sParts[0] * 60 + sParts[1]);
  if (mins < 0) mins += 24 * 60;
  return Math.round((mins / 60) * 100) / 100;
}
function fmt(n) { return (n == null ? 0 : n).toLocaleString("ko-KR"); }
function toYMD(d) { return d.toISOString().slice(0, 10); }
function getMotivation(worked, goal) {
  if (!goal || !worked) return null;
  const arr = worked >= goal ? MOTIVATIONS_SUCCESS : MOTIVATIONS_FAIL;
  return arr[Math.floor(Math.random() * arr.length)];
}

function pad2(n) { return String(n).padStart(2, "0"); }

function addBusinessDays(dateStr, days, holidays) {
  holidays = holidays || [];
  const parts = dateStr.split("-").map(Number);
  const d = new Date(parts[0], parts[1] - 1, parts[2]);
  let added = 0;
  while (added < days) {
    d.setDate(d.getDate() + 1);
    const dow = d.getDay();
    const ymd = d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate());
    if (dow !== 0 && dow !== 6 && holidays.indexOf(ymd) === -1) added++;
  }
  return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate());
}

function coupangSettlementDate(dateStr, holidays) {
  holidays = holidays || [];
  const parts = dateStr.split("-").map(Number);
  const d = new Date(parts[0], parts[1] - 1, parts[2]);
  const dow = d.getDay();
  const daysSinceWed = (dow - 3 + 7) % 7;
  const fri = new Date(parts[0], parts[1] - 1, parts[2] - daysSinceWed + 9);
  function ymd() { return fri.getFullYear() + "-" + pad2(fri.getMonth() + 1) + "-" + pad2(fri.getDate()); }
  while (fri.getDay() === 0 || fri.getDay() === 6 || holidays.indexOf(ymd()) !== -1) fri.setDate(fri.getDate() + 1);
  return ymd();
}

function nextWeekday(dateStr, targetDow) {
  const d = new Date(dateStr + "T00:00:00");
  const cur = d.getDay();
  let diff = targetDow - cur;
  if (diff <= 0) diff += 7;
  d.setDate(d.getDate() + diff);
  return toYMD(d);
}

function calcSettlementDate(dateStr, cat, holidays) {
  if (!cat || !cat.settlementType) return null;
  if (cat.settlementType === "coupang") return coupangSettlementDate(dateStr, holidays);
  if (cat.settlementType === "weekday") return nextWeekday(dateStr, cat.settlementDow == null ? 5 : cat.settlementDow);
  if (cat.settlementType === "businessDays") return addBusinessDays(dateStr, cat.settlementDays == null ? 3 : cat.settlementDays, holidays);
  return null;
}

function buildSettlements(data) {
  const days = data.days, settings = data.settings;
  const holidays = settings.holidays || [];
  const list = [];
  Object.keys(days).forEach(function(dateStr) {
    const day = days[dateStr];
    (day.incomeItems || []).forEach(function(item) {
      const amt = Number(item.amount) || 0;
      if (!amt) return;
      const catObj = settings.incomeCategories.find(function(c) { return (c.name || c) === item.category; });
      const netAmt = item.taxable ? Math.round(amt * (1 - settings.taxRate / 100)) : amt;
      let settlDate = null;
      if (catObj && catObj.settlementType === "manual") {
        settlDate = item.settlementDate || null;
      } else {
        settlDate = calcSettlementDate(dateStr, catObj, holidays);
      }
      if (settlDate) list.push({ workDate: dateStr, settlDate: settlDate, category: item.category || "기타", title: item.title || "", amount: amt, netAmt: netAmt, taxable: item.taxable, color: (catObj && catObj.color) || "#818cf8" });
    });
  });
  list.sort(function(a, b) { return a.settlDate.localeCompare(b.settlDate); });
  return list;
}

function getPendingFixedExpenses(dateStr, data) {
  const ym = dateStr.slice(0, 7);
  const day = parseInt(dateStr.split("-")[2], 10);
  const paidThisMonth = [];
  Object.keys(data.days).forEach(function(k) {
    const d = data.days[k];
    (d.checkedFixedExpenses || []).forEach(function(entry) {
      if (entry.indexOf(ym + "_") === 0) paidThisMonth.push(entry.slice(ym.length + 1));
    });
  });
  return (data.settings.fixedExpenses || []).filter(function(fe) {
    if (paidThisMonth.indexOf(fe.id) !== -1) return false;
    return fe.dayOfMonth <= day;
  });
}

const DEFAULT_DATA = {
  days: {},
  settings: {
    taxRate: 3.3,
    dailyGoalHours: 8,
    monthlyGoalIncome: 0,
    fixedOffDays: [0],
    timerMode: "up",
    theme: "dark",
    incomeCategories: [
      { name: "쿠팡", color: "#f97316", settlementType: "coupang" },
      { name: "배민", color: "#22c55e", settlementType: "businessDays", settlementDays: 3 },
      { name: "기타수입", color: "#818cf8", settlementType: "manual" }
    ],
    expenseCategories: DEFAULT_EXPENSE_CATEGORIES.slice(),
    fixedExpenses: [],
    holidays: []
  }
};

function loadDataLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed.settings && parsed.settings.incomeCategories && parsed.settings.incomeCategories[0] && typeof parsed.settings.incomeCategories[0] === "string") {
        parsed.settings.incomeCategories = parsed.settings.incomeCategories.map(function(n) { return { name: n, color: "#818cf8" }; });
      }
      if (parsed.settings && !parsed.settings.fixedExpenses) parsed.settings.fixedExpenses = [];
      if (parsed.settings && !parsed.settings.holidays) parsed.settings.holidays = [];
      return parsed;
    }
  } catch (e) {}
  return DEFAULT_DATA;
}
function saveDataLocal(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

function App() {
  const [data, setData] = useState(loadDataLocal);
  const [syncStatus, setSyncStatus] = useState("loading");
  const [tab, setTab] = useState("today");
  const [selectedDate, setSelectedDate] = useState(function() { return toYMD(new Date()); });
  const [calMonth, setCalMonth] = useState(function() { const d = new Date(); return { year: d.getFullYear(), month: d.getMonth() }; });
  const [timerRunning, setTimerRunning] = useState(false);
  const [timerStart, setTimerStart] = useState(null);
  const [timerElapsed, setTimerElapsed] = useState(0);
  const timerRef = useRef(null);
  const saveTimer = useRef(null);

  useEffect(function() {
    loadDataFromSupabase().then(function(cloudData) {
      if (cloudData) { setData(cloudData); saveDataLocal(cloudData); }
      setSyncStatus("synced");
    }).catch(function() { setSyncStatus("error"); });
  }, []);

  useEffect(function() {
    saveDataLocal(data);
    if (syncStatus === "synced" || syncStatus === "saving") {
      setSyncStatus("saving");
      clearTimeout(saveTimer.current);
      saveTimer.current = setTimeout(function() {
        saveDataToSupabase(data).then(function() { setSyncStatus("synced"); }).catch(function() { setSyncStatus("error"); });
      }, 1500);
    }
  }, [data]);

  useEffect(function() {
    try {
      const saved = localStorage.getItem(TIMER_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        setTimerStart(parsed.start);
        setTimerRunning(true);
      }
    } catch (e) {}
  }, []);

  useEffect(function() {
    if (timerRunning && timerStart) {
      timerRef.current = setInterval(function() {
        setTimerElapsed(Math.floor((Date.now() - new Date(timerStart).getTime()) / 1000));
      }, 1000);
    } else {
      clearInterval(timerRef.current);
    }
    return function() { clearInterval(timerRef.current); };
  }, [timerRunning, timerStart]);

  const updateDay = useCallback(function(date, updater) {
    setData(function(prev) {
      const nextDays = Object.assign({}, prev.days);
      nextDays[date] = updater(prev.days[date] || {});
      return Object.assign({}, prev, { days: nextDays });
    });
  }, []);
  const updateSettings = useCallback(function(updater) {
    setData(function(prev) { return Object.assign({}, prev, { settings: updater(prev.settings) }); });
  }, []);

  const handleClockIn = function() {
    const now = new Date();
    const iso = now.toISOString();
    setTimerStart(iso); setTimerRunning(true); setTimerElapsed(0);
    localStorage.setItem(TIMER_KEY, JSON.stringify({ start: iso }));
    const todayStr = toYMD(now);
    updateDay(todayStr, function(d) { return Object.assign({}, d, { startTime: pad2(now.getHours()) + ":" + pad2(now.getMinutes()) }); });
    setSelectedDate(todayStr); setTab("today");
  };
  const handleClockOut = function() {
    const now = new Date();
    setTimerRunning(false); localStorage.removeItem(TIMER_KEY);
    const todayStr = toYMD(now);
    updateDay(todayStr, function(d) { return Object.assign({}, d, { endTime: pad2(now.getHours()) + ":" + pad2(now.getMinutes()) }); });
    setTimerElapsed(0); setTimerStart(null);
  };

  function fmtTimer(s) {
    const a = Math.abs(s);
    return pad2(Math.floor(a / 3600)) + ":" + pad2(Math.floor((a % 3600) / 60)) + ":" + pad2(a % 60);
  }
  const isCountdown = data.settings.timerMode === "down";
  const goalSecs = (data.settings.dailyGoalHours || 0) * 3600;
  const displaySecs = isCountdown ? Math.max(goalSecs - timerElapsed, 0) : timerElapsed;
  const goalReached = isCountdown && timerElapsed >= goalSecs;
  const isDark = data.settings.theme !== "light";
  const T = isDark ? darkTheme : lightTheme;

  const tabs = [
    { id: "today", label: "📝 입력" },
    { id: "calendar", label: "🗓 달력" },
    { id: "settlement", label: "💳 정산" },
    { id: "stats", label: "📊 통계" },
    { id: "settings", label: "⚙️ 설정" }
  ];

  return (
    <div style={Object.assign({}, T.root, { fontFamily: "'Noto Sans KR', sans-serif", minHeight: "100vh" })}>
      <div style={T.header}>
        <div>
          <div style={T.headerTitle}>💼 나의 근무일지</div>
          <div style={T.headerDate}>{new Date().toLocaleDateString("ko-KR", { year: "numeric", month: "long", day: "numeric", weekday: "short" })}</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ fontSize: 11, color: syncStatus === "synced" ? "#4ade80" : syncStatus === "saving" ? "#facc15" : syncStatus === "loading" ? "#94a3b8" : "#f87171" }}>
            {syncStatus === "synced" ? "☁️ 저장됨" : syncStatus === "saving" ? "⏳ 저장 중..." : syncStatus === "loading" ? "🔄 불러오는 중..." : "⚠️ 저장 실패"}
          </div>
          <button onClick={function() { updateSettings(function(s) { return Object.assign({}, s, { theme: s.theme === "light" ? "dark" : "light" }); }); }} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer" }}>
            {isDark ? "☀️" : "🌙"}
          </button>
        </div>
      </div>

      <div style={T.timerBar}>
        {timerRunning ? (
          <React.Fragment>
            <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 22, fontWeight: 800, color: goalReached ? "#facc15" : isCountdown ? "#f87171" : "#4ade80", fontVariantNumeric: "tabular-nums" }}>
                <span style={{ width: 8, height: 8, borderRadius: "50%", display: "inline-block", background: goalReached ? "#facc15" : isCountdown ? "#f87171" : "#4ade80" }} />
                {fmtTimer(displaySecs)}
              </div>
              <div style={{ fontSize: 11, color: T.muted }}>{goalReached ? "🎉 목표 달성!" : isCountdown ? "⬇️ 카운트다운" : "⬆️ 카운트업"}</div>
            </div>
            <button onClick={handleClockOut} style={T.clockOutBtn}>🏁 퇴근</button>
          </React.Fragment>
        ) : (
          <React.Fragment>
            <div style={{ fontSize: 12, color: T.muted }}>{isCountdown ? ("⬇️ 카운트다운 (목표 " + data.settings.dailyGoalHours + "h)") : "⬆️ 카운트업"}</div>
            <button onClick={handleClockIn} style={T.clockInBtn}>▶ 출근 시작</button>
          </React.Fragment>
        )}
      </div>

      <div style={T.tabBar}>
        {tabs.map(function(t) {
          return <button key={t.id} onClick={function() { setTab(t.id); }} style={Object.assign({}, T.tabBtn, tab === t.id ? T.tabBtnActive : {})}>{t.label}</button>;
        })}
      </div>

      <div style={{ padding: "12px 12px 80px" }}>
        {tab === "today" && <DayInput date={selectedDate} setDate={setSelectedDate} data={data} updateDay={updateDay} T={T} />}
        {tab === "calendar" && <CalendarView data={data} calMonth={calMonth} setCalMonth={setCalMonth} setSelectedDate={function(d) { setSelectedDate(d); setTab("today"); }} T={T} />}
        {tab === "settlement" && <SettlementView data={data} T={T} />}
        {tab === "stats" && <StatsView data={data} T={T} />}
        {tab === "settings" && <SettingsView data={data} updateSettings={updateSettings} T={T} />}
      </div>
    </div>
  );
}

function DayInput(props) {
  const date = props.date, setDate = props.setDate, data = props.data, updateDay = props.updateDay, T = props.T;
  const settings = data.settings;
  const day = data.days[date] || {};
  const income = day.incomeItems || [];
  const expenseItems = day.expenseItems || [];
  const worked = calcHours(day.startTime, day.endTime);
  const totalIncome = income.reduce(function(s, i) { return s + (Number(i.amount) || 0); }, 0);
  const taxDeducted = income.reduce(function(s, i) { const a = Number(i.amount) || 0; return s + (i.taxable ? a * (1 - settings.taxRate / 100) : a); }, 0);
  const totalExpense = expenseItems.reduce(function(s, i) { return s + (Number(i.amount) || 0); }, 0);
  const motivation = (worked > 0 && settings.dailyGoalHours) ? getMotivation(worked, settings.dailyGoalHours) : null;
  function set(field, val) { updateDay(date, function(d) { const next = Object.assign({}, d); next[field] = val; return next; }); }
  const isFixedOff = settings.fixedOffDays.indexOf(new Date(date + "T00:00:00").getDay()) !== -1;
  const pendingFixed = getPendingFixedExpenses(date, data);

  function checkFixedExpense(fe) {
    const ym = date.slice(0, 7);
    updateDay(date, function(d) {
      const items = (d.expenseItems || []).concat([{ category: fe.category || "고정지출", title: fe.name, amount: fe.amount, isFixed: true }]);
      const checked = (d.checkedFixedExpenses || []).concat([ym + "_" + fe.id]);
      return Object.assign({}, d, { expenseItems: items, checkedFixedExpenses: checked });
    });
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      <div style={T.card}>
        <label style={T.label}>날짜 선택</label>
        <input type="date" value={date} onChange={function(e) { setDate(e.target.value); }} style={T.input} />
        {isFixedOff && !day.isOff && <div style={T.offBadge}>🛌 고정 휴일</div>}
      </div>

      <div style={T.card}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={T.label}>휴무일 설정</span>
          <label style={{ display: "flex", alignItems: "center", cursor: "pointer", fontSize: 13 }}>
            <input type="checkbox" checked={!!day.isOff} onChange={function(e) { set("isOff", e.target.checked); }} />
            <span style={{ marginLeft: 6 }}>{day.isOff ? "🚫 휴무" : "✅ 근무"}</span>
          </label>
        </div>
        {day.isOff && <input placeholder="휴무 사유..." value={day.offReason || ""} onChange={function(e) { set("offReason", e.target.value); }} style={Object.assign({}, T.input, { marginTop: 8 })} />}
      </div>

      {!day.isOff && (
        <div style={T.card}>
          <div style={T.label}>⏰ 근무 시간</div>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <div style={{ flex: 1 }}>
              <div style={T.subLabel}>출근</div>
              <input type="time" value={day.startTime || ""} onChange={function(e) { set("startTime", e.target.value); }} style={T.input} />
            </div>
            <div style={{ fontSize: 18, paddingTop: 16 }}>→</div>
            <div style={{ flex: 1 }}>
              <div style={T.subLabel}>퇴근</div>
              <input type="time" value={day.endTime || ""} onChange={function(e) { set("endTime", e.target.value); }} style={T.input} />
            </div>
          </div>
          {worked > 0 && (
            <div style={T.resultBox}>
              <span>⏱ 근무: <b>{worked}h</b></span>
              {settings.dailyGoalHours > 0 && <span>목표 {settings.dailyGoalHours}h {worked >= settings.dailyGoalHours ? "✅" : ("❌ (" + (settings.dailyGoalHours - worked).toFixed(1) + "h 부족)")}</span>}
            </div>
          )}
          {motivation && <div style={T.motivationBox}>{motivation}</div>}
        </div>
      )}

      <div style={T.card}>
        <div style={T.label}>💰 수입 내역</div>
        {income.map(function(item, i) {
          const catObj = settings.incomeCategories.find(function(c) { return (c.name || c) === item.category; });
          const catColor = (catObj && catObj.color) || "#818cf8";
          return (
            <div key={i} style={{ marginBottom: 10 }}>
              <div style={{ display: "flex", gap: 6, marginBottom: 4, alignItems: "center" }}>
                <select value={item.category || ""} onChange={function(e) { const next = income.slice(); next[i] = Object.assign({}, next[i], { category: e.target.value }); set("incomeItems", next); }} style={Object.assign({}, T.input, { flex: 1.2, borderLeft: "3px solid " + catColor })}>
                  <option value="">카테고리</option>
                  {settings.incomeCategories.map(function(c) { return <option key={c.name || c} value={c.name || c}>{c.name || c}</option>; })}
                </select>
                {item.category === "기타수입" && <input placeholder="제목" value={item.title || ""} onChange={function(e) { const next = income.slice(); next[i] = Object.assign({}, next[i], { title: e.target.value }); set("incomeItems", next); }} style={Object.assign({}, T.input, { flex: 1.5 })} />}
                <button onClick={function() { set("incomeItems", income.filter(function(_, j) { return j !== i; })); }} style={T.delBtn}>✕</button>
              </div>
              <div style={{ display: "flex", gap: 6, alignItems: "center" }}>

    </div>
  );

function CalendarView(props) {
  const data = props.data, calMonth = props.calMonth, setCalMonth = props.setCalMonth, setSelectedDate = props.setSelectedDate, T = props.T;
  const year = calMonth.year, month = calMonth.month;
  const settings = data.settings, days = data.days;
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = toYMD(new Date());
  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      <div style={T.card}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <button onClick={function() { setCalMonth(function(p) { return p.month === 0 ? { year: p.year - 1, month: 11 } : Object.assign({}, p, { month: p.month - 1 }); }); }} style={T.navBtn}>‹</button>
          <span style={{ fontSize: 16, fontWeight: 700 }}>{year}년 {month + 1}월</span>
          <button onClick={function() { setCalMonth(function(p) { return p.month === 11 ? { year: p.year + 1, month: 0 } : Object.assign({}, p, { month: p.month + 1 }); }); }} style={T.navBtn}>›</button>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 3 }}>
          {WEEKDAYS.map(function(d) { return <div key={d} style={{ textAlign: "center", fontSize: 11, color: T.muted, padding: "4px 0" }}>{d}</div>; })}
          {cells.map(function(d, i) {
            if (!d) return <div key={"e" + i} />;
            const ds = year + "-" + pad2(month + 1) + "-" + pad2(d);
            const dd = days[ds] || {};
            const worked = calcHours(dd.startTime, dd.endTime);
            const hasIncome = (dd.incomeItems || []).length > 0;
            const isToday = ds === today;
            const goalMet = worked >= settings.dailyGoalHours;
            const isFixed = settings.fixedOffDays.indexOf(new Date(ds + "T00:00:00").getDay()) !== -1;
            const hasPendingFixed = getPendingFixedExpenses(ds, data).length > 0;
            return (
              <div key={ds} onClick={function() { setSelectedDate(ds); }} style={{ minHeight: 52, borderRadius: 6, display: "flex", flexDirection: "column", alignItems: "center", padding: "4px 2px", cursor: "pointer", gap: 1, background: isToday ? "rgba(129,140,248,0.15)" : dd.isOff ? "rgba(248,113,113,0.08)" : (isFixed && !dd.startTime) ? "rgba(100,116,139,0.08)" : T.calCellBg, border: isToday ? "1px solid rgba(129,140,248,0.4)" : "1px solid transparent" }}>
                <div style={{ fontSize: 13, fontWeight: isToday ? 700 : 400 }}>{d}</div>
                {worked > 0 && <div style={{ fontSize: 9, color: goalMet ? "#4ade80" : "#f87171" }}>{worked}h</div>}
                {hasIncome && <div style={{ fontSize: 9 }}>💰</div>}
                {dd.isOff && <div style={{ fontSize: 9 }}>🚫</div>}
                {dd.weather && <div style={{ fontSize: 9 }}>{(WEATHER_OPTIONS.find(function(w) { return w.label === dd.weather; }) || {}).icon}</div>}
                {(dd.photos || []).length > 0 && <div style={{ fontSize: 9 }}>📸</div>}
                {hasPendingFixed && <div style={{ fontSize: 9 }}>📌</div>}
              </div>
            );
          })}
        </div>
      </div>
      <MonthSummary data={data} year={year} month={month} T={T} />
    </div>
  );
}

function MonthSummary(props) {
  const data = props.data, year = props.year, month = props.month, T = props.T;
  const days = data.days, settings = data.settings;
  const prefix = year + "-" + pad2(month + 1);
  let totalWorked = 0, totalIncome = 0, totalTaxed = 0, totalExpense = 0, workDays = 0;
  Object.keys(days).filter(function(k) { return k.indexOf(prefix) === 0; }).forEach(function(k) {
    const d = days[k];
    const w = calcHours(d.startTime, d.endTime);
    if (w > 0) { totalWorked += w; workDays++; }
    (d.incomeItems || []).forEach(function(i) { const a = Number(i.amount) || 0; totalIncome += a; totalTaxed += i.taxable ? a * (1 - settings.taxRate / 100) : a; });
    (d.expenseItems || []).forEach(function(i) { totalExpense += Number(i.amount) || 0; });
  });
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const now = new Date();
  const isCurrent = now.getFullYear() === year && now.getMonth() === month;
  let predicted = null;
  if (isCurrent && workDays > 0) {
    let remain = 0;
    for (let d = now.getDate() + 1; d <= daysInMonth; d++) {
      const ds = year + "-" + pad2(month + 1) + "-" + pad2(d);
      if (settings.fixedOffDays.indexOf(new Date(ds + "T00:00:00").getDay()) === -1 && !((days[ds] || {}).isOff)) remain++;
    }
    predicted = totalIncome + (totalIncome / workDays) * remain;
  }
  const goalIncome = settings.monthlyGoalIncome || 0;
  const goalPct = goalIncome > 0 ? Math.min(Math.round((totalTaxed / goalIncome) * 100), 100) : null;
  return (
    <div style={T.summaryCard}>
      <div style={T.summaryTitle}>{month + 1}월 요약</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 10 }}>
        <SI label="근무일" value={workDays + "일"} />
        <SI label="총 근무" value={totalWorked.toFixed(1) + "h"} />
        <SI label="총 수입" value={"₩" + fmt(Math.round(totalIncome))} />
        <SI label="세후 수입" value={"₩" + fmt(Math.round(totalTaxed))} color="#4ade80" />
        <SI label="총 지출" value={"₩" + fmt(Math.round(totalExpense))} color="#f87171" />
        <SI label="순수익" value={"₩" + fmt(Math.round(totalTaxed - totalExpense))} color={(totalTaxed - totalExpense >= 0) ? "#4ade80" : "#f87171"} />
      </div>
      {goalPct !== null && (
        <div style={{ marginTop: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 4 }}>
            <span>월 목표 달성률</span><span style={{ color: "#facc15", fontWeight: 700 }}>{goalPct}%</span>
          </div>
          <div style={{ background: "rgba(255,255,255,0.08)", borderRadius: 4, height: 8 }}>
            <div style={{ width: goalPct + "%", height: "100%", borderRadius: 4, background: "linear-gradient(90deg,#818cf8,#facc15)", transition: "width 0.5s" }} />
          </div>
          <div style={{ fontSize: 11, color: T.muted, marginTop: 4 }}>목표: ₩{fmt(goalIncome)}</div>
        </div>
      )}
      {predicted !== null && (
        <div style={{ marginTop: 10, padding: "8px 12px", background: "rgba(250,204,21,0.08)", borderRadius: 8, fontSize: 13, color: "#facc15", textAlign: "center" }}>
          📈 이번 달 예상 수입: <b>₩{fmt(Math.round(predicted))}</b>
        </div>
      )}
    </div>
  );
}

function SettlementView(props) {
  const data = props.data, T = props.T;
  const today = toYMD(new Date());
  const settlements = buildSettlements(data);
  const upcoming = settlements.filter(function(s) { return s.settlDate >= today; });
  const past = settlements.filter(function(s) { return s.settlDate < today; });
  const totalUpcoming = upcoming.reduce(function(s, i) { return s + i.netAmt; }, 0);
  const totalPast = past.reduce(function(s, i) { return s + i.netAmt; }, 0);

  function groupByDate(arr) {
    const grouped = {};
    arr.forEach(function(s) {
      if (!grouped[s.settlDate]) grouped[s.settlDate] = [];
      grouped[s.settlDate].push(s);
    });
    return grouped;
  }

  const upcomingGrouped = groupByDate(upcoming);
  const upcomingDates = Object.keys(upcomingGrouped).sort();
  const pastGrouped = groupByDate(past);
  const pastDates = Object.keys(pastGrouped).sort().reverse();

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      <div style={T.summaryCard}>
        <div style={T.summaryTitle}>💳 정산 현황</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 10 }}>
          <SI label="예정 정산 합계" value={"₩" + fmt(totalUpcoming)} color="#4ade80" />
          <SI label="완료 정산 합계" value={"₩" + fmt(totalPast)} color="#64748b" />
        </div>
      </div>
      <div style={T.card}>
        <div style={T.label}>⏳ 다가오는 정산 ({upcomingDates.length}일, {upcoming.length}건)</div>
        {upcomingDates.length === 0 && <div style={{ fontSize: 13, color: T.muted }}>예정된 정산이 없어요</div>}
        {upcomingDates.map(function(date) {
          const items = upcomingGrouped[date];
          const totalNet = items.reduce(function(s, i) { return s + i.netAmt; }, 0);
          const totalAmt = items.reduce(function(s, i) { return s + i.amount; }, 0);
          const isToday = date === today;
          const dp = date.split("-").map(Number);
          const d = new Date(dp[0], dp[1] - 1, dp[2]);
          const tp = today.split("-").map(Number);
          const t = new Date(tp[0], tp[1] - 1, tp[2]);
          const diff = Math.round((d - t) / 86400000);
          return (
            <div key={date} style={{ borderRadius: 10, marginBottom: 10, background: isToday ? "rgba(74,222,128,0.08)" : "rgba(255,255,255,0.03)", border: "1px solid " + (isToday ? "rgba(74,222,128,0.3)" : "rgba(255,255,255,0.06)"), overflow: "hidden" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 12px", borderBottom: items.length > 1 ? "1px solid rgba(255,255,255,0.06)" : "none" }}>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 700 }}>
                    {date.slice(5).replace("-", "/")} ({WEEKDAYS[d.getDay()]})
                    {isToday && <span style={{ color: "#4ade80", marginLeft: 6 }}>● 오늘!</span>}
                    {diff === 1 && <span style={{ color: "#facc15", marginLeft: 6 }}>● 내일!</span>}
                    {diff > 1 && diff <= 7 && <span style={{ color: T.muted, marginLeft: 6 }}>{diff}일 후</span>}
                  </div>
                  <div style={{ fontSize: 11, color: T.muted, marginTop: 2 }}>{items.length}건</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  {totalAmt !== totalNet && <div style={{ fontSize: 11, color: T.muted, textDecoration: "line-through" }}>₩{fmt(totalAmt)}</div>}
                  <div style={{ fontSize: 16, fontWeight: 800, color: "#4ade80" }}>₩{fmt(totalNet)}</div>
                </div>
              </div>
              {items.map(function(s, i) {
                return (
                  <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 12px", borderBottom: i < items.length - 1 ? "1px solid rgba(255,255,255,0.04)" : "none", background: "rgba(0,0,0,0.1)" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <div style={{ width: 8, height: 8, borderRadius: "50%", background: s.color, flexShrink: 0 }} />
                      <div>
                        <div style={{ fontSize: 12 }}>{s.category}{s.title ? (" · " + s.title) : ""}</div>
                        <div style={{ fontSize: 10, color: T.muted }}>일한 날: {s.workDate.slice(5).replace("-", "/")}</div>
                      </div>
                    </div>
                    <div style={{ fontSize: 13, fontWeight: 600, color: "#4ade80" }}>₩{fmt(s.netAmt)}</div>
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
      {past.length > 0 && (
        <div style={T.card}>
          <div style={T.label}>✅ 완료된 정산 ({pastDates.length}일, {past.length}건)</div>
          {pastDates.map(function(date) {
            const items = pastGrouped[date];
            const totalNet = items.reduce(function(s, i) { return s + i.netAmt; }, 0);
            const dp = date.split("-").map(Number);
            const d = new Date(dp[0], dp[1] - 1, dp[2]);
            return (
              <div key={date} style={{ borderRadius: 10, marginBottom: 8, background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.04)", overflow: "hidden", opacity: 0.7 }}>
                <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 12px", borderBottom: items.length > 1 ? "1px solid rgba(255,255,255,0.04)" : "none" }}>
                  <div style={{ fontSize: 12, fontWeight: 600 }}>{date.slice(5).replace("-", "/")} ({WEEKDAYS[d.getDay()]})</div>
                  <div style={{ fontSize: 13, fontWeight: 700, color: T.muted }}>₩{fmt(totalNet)}</div>
                </div>
                {items.map(function(s, i) {
                  return (
                    <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "6px 12px", background: "rgba(0,0,0,0.1)", borderBottom: i < items.length - 1 ? "1px solid rgba(255,255,255,0.03)" : "none" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <div style={{ width: 7, height: 7, borderRadius: "50%", background: s.color }} />
                        <span style={{ fontSize: 11 }}>{s.category}{s.title ? (" · " + s.title) : ""}</span>
                      </div>
                      <span style={{ fontSize: 11, color: T.muted }}>₩{fmt(s.netAmt)}</span>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function StatsView(props) {
  const data = props.data, T = props.T;
  const days = data.days, settings = data.settings;
  const [viewYear, setViewYear] = useState(function() { return new Date().getFullYear(); });
  let yearIncome = 0, yearTaxed = 0, yearExpense = 0, yearWorked = 0;
  const monthlyStats = [];
  for (let m = 0; m < 12; m++) {
    const prefix = viewYear + "-" + pad2(m + 1);
    let inc = 0, taxed = 0, exp = 0, worked = 0;
    Object.keys(days).filter(function(k) { return k.indexOf(prefix) === 0; }).forEach(function(k) {
      const d = days[k];
      const w = calcHours(d.startTime, d.endTime);
      worked += w;
      (d.incomeItems || []).forEach(function(i) { const a = Number(i.amount) || 0; inc += a; taxed += i.taxable ? a * (1 - settings.taxRate / 100) : a; });
      (d.expenseItems || []).forEach(function(i) { exp += Number(i.amount) || 0; });
    });
    yearIncome += inc; yearTaxed += taxed; yearExpense += exp; yearWorked += worked;
    monthlyStats.push({ month: m + 1, inc: inc, taxed: taxed, exp: exp, worked: worked });
  }
  let streak = 0;
  const sortedDayKeys = Object.keys(days).sort().reverse();
  for (let idx = 0; idx < sortedDayKeys.length; idx++) {
    const w = calcHours(days[sortedDayKeys[idx]].startTime, days[sortedDayKeys[idx]].endTime);
    if (w >= settings.dailyGoalHours && settings.dailyGoalHours > 0) streak++; else break;
  }
  const weekdayStats = [];
  for (let i = 0; i < 7; i++) weekdayStats.push({ day: i, totalIncome: 0, count: 0, totalWorked: 0 });
  Object.keys(days).forEach(function(ds) {
    const d = days[ds];
    const dayIdx = new Date(ds + "T00:00:00").getDay();
    const w = calcHours(d.startTime, d.endTime);
    const inc = (d.incomeItems || []).reduce(function(s, i) { return s + (Number(i.amount) || 0); }, 0);
    if (w > 0 || inc > 0) { weekdayStats[dayIdx].count++; weekdayStats[dayIdx].totalIncome += inc; weekdayStats[dayIdx].totalWorked += w; }
  });
  const maxWDIncome = Math.max.apply(null, weekdayStats.map(function(w) { return w.count > 0 ? w.totalIncome / w.count : 0; }).concat([1]));
  const expByCat = {};
  settings.expenseCategories.forEach(function(c) { expByCat[c] = 0; });
  Object.keys(days).forEach(function(k) {
    (days[k].expenseItems || []).forEach(function(i) {
      const c = i.category || "기타";
      expByCat[c] = (expByCat[c] || 0) + (Number(i.amount) || 0);
    });
  });
  const maxInc = Math.max.apply(null, monthlyStats.map(function(m) { return m.inc; }).concat([1]));

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      <div style={T.card}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <button onClick={function() { setViewYear(function(y) { return y - 1; }); }} style={T.navBtn}>‹</button>
          <span style={{ fontWeight: 700, fontSize: 16 }}>{viewYear}년 통계</span>
          <button onClick={function() { setViewYear(function(y) { return y + 1; }); }} style={T.navBtn}>›</button>
        </div>
      </div>
      <div style={T.summaryCard}>
        <div style={T.summaryTitle}>🗓 {viewYear}년 전체</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 10 }}>
          <SI label="총 근무" value={yearWorked.toFixed(0) + "h"} />
          <SI label="총 수입" value={"₩" + fmt(Math.round(yearIncome))} />
          <SI label="세후 수입" value={"₩" + fmt(Math.round(yearTaxed))} color="#4ade80" />
          <SI label="총 지출" value={"₩" + fmt(Math.round(yearExpense))} color="#f87171" />
          <SI label="순수익" value={"₩" + fmt(Math.round(yearTaxed - yearExpense))} color={(yearTaxed - yearExpense >= 0) ? "#4ade80" : "#f87171"} />
          <SI label="연속달성" value={streak + "일 🔥"} color="#facc15" />
        </div>
      </div>
      <div style={T.card}>
        <div style={T.label}>📊 월별 수입</div>
        <div style={{ display: "flex", gap: 4, alignItems: "flex-end", height: 100, marginTop: 8 }}>
          {monthlyStats.map(function(m) {
            return (
              <div key={m.month} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                <div style={{ width: "100%", background: "linear-gradient(to top,#6366f1,#818cf8)", borderRadius: "3px 3px 0 0", height: Math.max((m.inc / maxInc) * 80, m.inc > 0 ? 4 : 0) + "px", transition: "height 0.3s" }} />
                <div style={{ fontSize: 9, color: T.muted }}>{m.month}월</div>
              </div>
            );
          })}
        </div>
      </div>
      <div style={T.card}>
        <div style={T.label}>📊 요일별 평균 수입</div>
        <div style={{ display: "flex", gap: 4, alignItems: "flex-end", height: 80, marginTop: 8 }}>
          {weekdayStats.map(function(w) {
            const avg = w.count > 0 ? w.totalIncome / w.count : 0;
            return (
              <div key={w.day} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                <div style={{ width: "100%", background: "linear-gradient(to top,#f97316,#facc15)", borderRadius: "3px 3px 0 0", height: Math.max((avg / maxWDIncome) * 64, avg > 0 ? 4 : 0) + "px", transition: "height 0.3s" }} />
                <div style={{ fontSize: 9, color: T.muted }}>{WEEKDAYS[w.day]}</div>
              </div>
            );
          })}
        </div>
        <div style={{ marginTop: 8, display: "flex", flexDirection: "column", gap: 4 }}>
          {weekdayStats.filter(function(w) { return w.count > 0; }).sort(function(a, b) { return (b.totalIncome / b.count) - (a.totalIncome / a.count); }).slice(0, 3).map(function(w, i) {
            return (
              <div key={w.day} style={{ display: "flex", justifyContent: "space-between", fontSize: 12 }}>
                <span>{i === 0 ? "🥇" : i === 1 ? "🥈" : "🥉"} {WEEKDAYS[w.day]}요일</span>
                <span style={{ color: "#facc15" }}>평균 ₩{fmt(Math.round(w.totalIncome / w.count))}</span>
              </div>
            );
          })}
        </div>
      </div>
      <div style={T.card}>
        <div style={T.label}>💸 지출 카테고리별 합계</div>
        {Object.keys(expByCat).filter(function(c) { return expByCat[c] > 0; }).sort(function(a, b) { return expByCat[b] - expByCat[a]; }).map(function(cat) {
          return (
            <div key={cat} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: "1px solid " + T.divider }}>
              <span style={{ fontSize: 13 }}>{cat}</span>
              <span style={{ fontSize: 13, color: "#f87171", fontWeight: 600 }}>₩{fmt(expByCat[cat])}</span>
            </div>
          );
        })}
        {Object.keys(expByCat).every(function(c) { return expByCat[c] === 0; }) && <div style={{ color: T.muted, fontSize: 13 }}>지출 내역이 없어요</div>}
      </div>
      <div style={T.card}>
        <div style={T.label}>📋 월별 상세</div>
        {monthlyStats.filter(function(m) { return m.inc > 0 || m.worked > 0; }).map(function(m) {
          return (
            <div key={m.month} style={{ padding: "8px 0", borderBottom: "1px solid " + T.divider }}>
              <div style={{ fontWeight: 600, marginBottom: 4 }}>{m.month}월</div>
              <div style={{ display: "flex", gap: 12, fontSize: 12, color: T.muted, flexWrap: "wrap" }}>
                <span>⏱ {m.worked.toFixed(1)}h</span>
                <span>💰 ₩{fmt(Math.round(m.inc))}</span>
                <span style={{ color: "#4ade80" }}>세후 ₩{fmt(Math.round(m.taxed))}</span>
                <span style={{ color: "#f87171" }}>지출 ₩{fmt(Math.round(m.exp))}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

  function exportData() {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "work_tracker_backup.json"; a.click();
    URL.revokeObjectURL(url);
  }
  function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (parsed.days && parsed.settings) {
          localStorage.setItem(STORAGE_KEY, ev.target.result);
          window.location.reload();
        } else {
          alert("올바른 백업 파일이 아니에요!");
        }

        alert("파일을 읽을 수 없어요!");

    reader.readAsText(file);
  }

        <div style={T.label}>🎌 공휴일 등록</div>
        <div style={{ fontSize: 11, color: T.muted, marginBottom: 10 }}>등록한 공휴일은 영업일 계산에서 자동으로 제외돼요</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 10 }}>
          {(settings.holidays || []).slice().sort().map(function(h) {
            const parts = h.split("-").map(Number);
            const d = new Date(parts[0], parts[1] - 1, parts[2]);
            return (
              <div key={h} style={{ display: "flex", alignItems: "center", gap: 4, padding: "4px 10px", background: "rgba(248,113,113,0.1)", borderRadius: 20, fontSize: 12, color: "#f87171", border: "1px solid rgba(248,113,113,0.2)" }}>
                {h.slice(5).replace("-", "/")} ({WEEKDAYS[d.getDay()]})
                <button onClick={function() { updateSettings(function(s) { return Object.assign({}, s, { holidays: (s.holidays || []).filter(function(x) { return x !== h; }) }); }); }} style={{ background: "none", border: "none", color: "#f87171", cursor: "pointer", fontSize: 11, padding: 0 }}>✕</button>
              </div>
            );
          })}
          {!(settings.holidays || []).length && <div style={{ fontSize: 12, color: T.muted }}>등록된 공휴일이 없어요</div>}
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <input type="date" value={holidayInput} onChange={function(e) { setHolidayInput(e.target.value); }} style={Object.assign({}, T.input, { flex: 1 })} />
          <button onClick={function() {
            if (holidayInput && (settings.holidays || []).indexOf(holidayInput) === -1) {
              updateSettings(function(s) { return Object.assign({}, s, { holidays: (s.holidays || []).concat([holidayInput]).sort() }); });
              setHolidayInput("");
            }
          }} style={T.addBtn}>추가</button>
        </div>
      </div>

      <div style={T.card}>
        <div style={T.label}>💾 데이터 백업 / 복원</div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <button onClick={exportData} style={Object.assign({}, T.addBtn, { background: "rgba(74,222,128,0.1)", borderColor: "rgba(74,222,128,0.3)", color: "#4ade80" })}>📤 백업 파일 다운로드</button>
          <label style={Object.assign({}, T.addBtn, { cursor: "pointer", background: "rgba(250,204,21,0.1)", borderColor: "rgba(250,204,21,0.3)", color: "#facc15" })}>
            📥 백업 파일 불러오기
            <input type="file" accept=".json" style={{ display: "none" }} onChange={importData} />
          </label>
        </div>
        <div style={{ fontSize: 11, color: T.muted, marginTop: 8 }}>데이터를 JSON 파일로 저장하거나 복원할 수 있어요</div>
      </div>
    </div>
  );
}
