name: Supabase Ping
on:
  schedule:
- cron: '0 0 */3 * *'  # 3일마다 자동 실행
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          response=$(curl -s -o response.txt -w "%{http_code}" \
            "https://havjlvtpgqimgkgbblif.supabase.co/rest/v1/work_tracker_data?select=user_id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}")
          echo "HTTP Status: $response"
          cat response.txt
          if [ "$response" -ne 200 ]; then
            echo "Ping failed!"
            exit 1
          fi
