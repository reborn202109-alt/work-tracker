name: Supabase Ping

on:
  schedule:
    - cron: '0 0 * * 1'  # 매주 월요일 자동 실행
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s "https://havjlvtpgqimgkgbblif.supabase.co/rest/v1/work_tracker_data?select=user_id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"
